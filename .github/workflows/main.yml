name: king Bot Runner

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: xobot-group
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund

      - name: Run Bot
        env:
          U_MAIL_1: ${{ secrets.U_MAIL_1 }}
          U_PASS_1: ${{ secrets.U_PASS_1 }}

          U_MAIL_2: ${{ secrets.U_MAIL_2 }}
          U_PASS_2: ${{ secrets.U_PASS_2 }}

          U_MAIL_3: ${{ secrets.U_MAIL_3 }}
          U_PASS_3: ${{ secrets.U_PASS_3 }}

          U_MAIL_4: ${{ secrets.U_MAIL_4 }}
          U_PASS_4: ${{ secrets.U_PASS_4 }}

          U_MAIL_5: ${{ secrets.U_MAIL_5 }}
          U_PASS_5: ${{ secrets.U_PASS_5 }}

          U_MAIL_6: ${{ secrets.U_MAIL_6 }}
          U_PASS_6: ${{ secrets.U_PASS_6 }}

          U_MAIL_7: ${{ secrets.U_MAIL_7 }}
          U_PASS_7: ${{ secrets.U_PASS_7 }}

          U_MAIL_8: ${{ secrets.U_MAIL_8 }}
          U_PASS_8: ${{ secrets.U_PASS_8 }}

          U_MAIL_9: ${{ secrets.U_MAIL_9 }}
          U_PASS_9: ${{ secrets.U_PASS_9 }}

          U_MAIL_10: ${{ secrets.U_MAIL_10 }}
          U_PASS_10: ${{ secrets.U_PASS_10 }}

          U_MAIL_11: ${{ secrets.U_MAIL_11 }}
          U_PASS_11: ${{ secrets.U_PASS_11 }}

          U_MAIL_12: ${{ secrets.U_MAIL_12 }}
          U_PASS_12: ${{ secrets.U_PASS_12 }}
          
          U_MAIL_13: ${{ secrets.U_MAIL_13 }}
          U_PASS_13: ${{ secrets.U_PASS_13 }}
          
        run: node index.js
